<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Object Detection</title>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

#videoContainer{
  position:relative;
  width:640px;
  height:480px;
  margin:auto;
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:640px;
  height:480px;
}

video{
  border:2px solid #333;
  border-radius:12px;
  background:black;
}

canvas{
  pointer-events:none;
}

/* flip front camera back to normal */
video.mirrored, canvas.mirrored{
  transform: scaleX(-1);
}

#result{
  margin-top:20px;
  font-size:1.2em;
  font-weight:bold;
}

button{
  margin-top:15px;
  padding:10px 20px;
  font-size:1em;
  border-radius:8px;
  border:1px solid #333;
  background:white;
  cursor:pointer;
}

button:hover{
  background:#ddd;
}

/* dropdown */
#dropdownContent{
  display:none;
  margin-top:15px;
  background:white;
  padding:15px;
  border-radius:10px;
  border:1px solid #ccc;
  max-width:700px;
  margin:auto;
}

/* search */
#searchBox{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* categories */
.category{
  margin-top:10px;
  text-align:left;
}

.category h3{
  margin:5px 0;
  font-size:1em;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px;
}

.object-item{
  padding:6px;
  border-radius:6px;
  background:#eee;
  font-size:0.85em;
  transition:0.2s;
}

/* highlight */
@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

.object-item.active{
  background:#00ffff;
  font-weight:bold;
  animation:pulse 0.5s ease;
}
</style>
</head>

<body>

<h1>Live Object Detection</h1>

<div id="videoContainer">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<button id="toggleCameraBtn">Toggle Camera</button>

<div>
  <button id="dropdownBtn">See what this model can detect ▼</button>

  <div id="dropdownContent">
    <input id="searchBox" placeholder="Search objects...">
    <div id="objectContainer"></div>
  </div>
</div>

<div id="result">Loading model...</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
// categories
const CATEGORIES = {
  "People":["person"],
  "Vehicles":["bicycle","car","motorcycle","airplane","bus","train","truck","boat"],
  "Animals":["bird","cat","dog","horse","sheep","cow","elephant","bear","zebra","giraffe"],
  "Food":["banana","apple","sandwich","orange","pizza","cake"],
  "Furniture":["chair","couch","bed","dining table"],
  "Electronics":["tv","laptop","mouse","keyboard","cell phone"],
  "Misc":["book","clock","vase","scissors","teddy bear"]
}

// build UI
const container=document.getElementById("objectContainer")

Object.entries(CATEGORIES).forEach(([cat,items])=>{
  const section=document.createElement("div")
  section.className="category"

  const title=document.createElement("h3")
  title.innerText=cat

  const grid=document.createElement("div")
  grid.className="grid"

  items.forEach(obj=>{
    const div=document.createElement("div")
    div.className="object-item"
    div.innerText=obj
    div.dataset.name=obj
    grid.appendChild(div)
  })

  section.appendChild(title)
  section.appendChild(grid)
  container.appendChild(section)
})

const allItems=[...document.querySelectorAll(".object-item")]

const video=document.getElementById("webcam")
const canvas=document.getElementById("overlay")
const ctx=canvas.getContext("2d")
const resultDiv=document.getElementById("result")
const toggleBtn=document.getElementById("toggleCameraBtn")

const dropdownBtn=document.getElementById("dropdownBtn")
const dropdownContent=document.getElementById("dropdownContent")
const searchBox=document.getElementById("searchBox")

let model
let currentStream=null
let useFrontCamera=false

// dropdown
dropdownBtn.onclick=()=>{
  const show=dropdownContent.style.display==="block"
  dropdownContent.style.display=show?"none":"block"
  dropdownBtn.innerText=show?"See what this model can detect ▼":"See what this model can detect ▲"
}

// search
searchBox.oninput=()=>{
  const q=searchBox.value.toLowerCase()
  allItems.forEach(el=>{
    el.style.display=el.dataset.name.includes(q)?"block":"none"
  })
}

// camera setup
async function setupCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop())
  }

  const constraints={
    audio:false,
    video:{facingMode:useFrontCamera?"user":{exact:"environment"}}
  }

  try{
    currentStream=await navigator.mediaDevices.getUserMedia(constraints)
  }catch{
    constraints.video.facingMode="user"
    currentStream=await navigator.mediaDevices.getUserMedia(constraints)
  }

  video.srcObject=currentStream

  // ✅ FIX: flip front camera back to normal
  video.classList.toggle("mirrored", useFrontCamera)
  canvas.classList.toggle("mirrored", useFrontCamera)

  return new Promise(resolve=>{
    video.onloadedmetadata=()=>resolve(video)
  })
}

async function loadModel(){
  model=await cocoSsd.load()
  resultDiv.innerText="Model loaded!"
}

async function detect(){
  if(!model || !video.videoWidth){
    requestAnimationFrame(detect)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  const predictions=await model.detect(video)
  ctx.clearRect(0,0,canvas.width,canvas.height)

  const detected=[]
  const activeSet=new Set()

  predictions.forEach(pred=>{
    const [x,y,w,h]=pred.bbox

    ctx.strokeStyle="#00FFFF"
    ctx.lineWidth=2
    ctx.strokeRect(x,y,w,h)

    ctx.fillStyle="#00FFFF"
    ctx.fillText(pred.class, x, y>10?y-5:10)

    detected.push(pred.class)
    activeSet.add(pred.class)
  })

  // highlight
  allItems.forEach(el=>{
    el.classList.toggle("active", activeSet.has(el.dataset.name))
  })

  // count
  const counts={}
  detected.forEach(o=>counts[o]=(counts[o]||0)+1)

  resultDiv.innerText = Object.entries(counts)
    .map(([k,v])=>`${k} (${v})`)
    .join(", ") || "No objects detected"

  requestAnimationFrame(detect)
}

toggleBtn.onclick=async()=>{
  useFrontCamera=!useFrontCamera
  await setupCamera()
}

(async()=>{
  await setupCamera()
  await loadModel()
  detect()
})()
</script>

</body>
</html>
