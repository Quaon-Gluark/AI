<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Object Detection</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #f4f4f4;
  margin: 0;
  padding: 20px;
}
video, canvas {
  border: 2px solid #333;
  border-radius: 12px;
  width: 640px;
  height: 480px;
  margin-top: 20px;
  background: black;
}
video.mirrored, canvas.mirrored {
  transform: scaleX(-1);
}
#result {
  margin-top: 20px;
  font-size: 1.2em;
  font-weight: bold;
  color: #333;
  min-height: 1.8em;
}
button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 1em;
  cursor: pointer;
  border-radius: 8px;
  border: 1px solid #333;
  background: white;
}
button:hover {
  background-color: #ddd;
}
</style>
</head>
<body>

<h1>Live Object Detection</h1>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="overlay"></canvas><br>

<button id="toggleCameraBtn">Toggle Camera</button>
<div id="result">Loading model...</div>

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<!-- COCO-SSD -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
const video = document.getElementById("webcam");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");
const resultDiv = document.getElementById("result");
const toggleBtn = document.getElementById("toggleCameraBtn");

let model;
let currentStream = null;
let useFrontCamera = false;

/* CAMERA SETUP */
async function setupCamera() {
  if (currentStream) currentStream.getTracks().forEach(track => track.stop());

  const constraints = {
    audio: false,
    video: { facingMode: useFrontCamera ? "user" : { exact: "environment" } }
  };

  try {
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch {
    constraints.video.facingMode = "user";
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
  }

  video.srcObject = currentStream;
  video.classList.toggle("mirrored", useFrontCamera);
  canvas.classList.toggle("mirrored", useFrontCamera);

  return new Promise(resolve => {
    video.onloadedmetadata = () => resolve(video);
  });
}

/* LOAD COCO-SSD MODEL */
async function loadModel() {
  model = await cocoSsd.load();
  resultDiv.innerText = "Model loaded! Starting detection...";
}

/* PREDICTION LOOP */
async function predictLoop() {
  if (!model || !video.videoWidth) {
    requestAnimationFrame(predictLoop);
    return;
  }

  const predictions = await model.detect(video);

  // Resize canvas to video
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  // Clear previous frame
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw predictions
  predictions.forEach(pred => {
    const [x, y, width, height] = pred.bbox;
    ctx.strokeStyle = "#00FFFF";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, width, height);
    ctx.font = "16px Arial";
    ctx.fillStyle = "#00FFFF";
    ctx.fillText(`${pred.class} (${(pred.score*100).toFixed(1)}%)`, x, y > 10 ? y - 5 : 10);
  });

  // Display detected objects in text
  if (predictions.length > 0) {
    resultDiv.innerText = `Detected: ${predictions.map(p => p.class).join(", ")}`;
  } else {
    resultDiv.innerText = "No objects detected";
  }

  requestAnimationFrame(predictLoop);
}

/* CAMERA TOGGLE */
toggleBtn.onclick = async () => {
  useFrontCamera = !useFrontCamera;
  await setupCamera();
};

/* START */
(async () => {
  await setupCamera();
  await loadModel();
  predictLoop();
})();
</script>

</body>
</html>
