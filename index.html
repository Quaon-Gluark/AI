<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Object Detection</title>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

#videoContainer{
  position:relative;
  width:640px;
  height:480px;
  margin:auto;
}

video{
  position:absolute;
  top:0;
  left:0;
  width:640px;
  height:480px;
  border:2px solid #333;
  border-radius:12px;
  background:black;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:640px;
  height:480px;
  pointer-events:none;
}

video.mirrored, canvas.mirrored{
  transform:scaleX(-1);
}

#result{
  margin-top:20px;
  font-size:1.2em;
  font-weight:bold;
}

button{
  margin-top:15px;
  padding:10px 20px;
  font-size:1em;
  border-radius:8px;
  border:1px solid #333;
  background:white;
  cursor:pointer;
}

button:hover{
  background:#ddd;
}
</style>
</head>

<body>

<h1>Live Object Detection</h1>

<div id="videoContainer">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<br>
<button id="toggleCameraBtn">Toggle Camera</button>
<div id="result">Loading model...</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
const video = document.getElementById("webcam")
const canvas = document.getElementById("overlay")
const ctx = canvas.getContext("2d")
const resultDiv = document.getElementById("result")
const toggleBtn = document.getElementById("toggleCameraBtn")

let model
let currentStream=null
let useFrontCamera=false

async function setupCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop())
  }

  const constraints={
    audio:false,
    video:{facingMode:useFrontCamera?"user":{exact:"environment"}}
  }

  try{
    currentStream=await navigator.mediaDevices.getUserMedia(constraints)
  }catch{
    constraints.video.facingMode="user"
    currentStream=await navigator.mediaDevices.getUserMedia(constraints)
  }

  video.srcObject=currentStream
  video.classList.toggle("mirrored",useFrontCamera)
  canvas.classList.toggle("mirrored",useFrontCamera)

  return new Promise(resolve=>{
    video.onloadedmetadata=()=>resolve(video)
  })
}

async function loadModel(){
  model=await cocoSsd.load()
  resultDiv.innerText="Model loaded!"
}

async function detect(){
  if(!model || !video.videoWidth){
    requestAnimationFrame(detect)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  const predictions=await model.detect(video)
  ctx.clearRect(0,0,canvas.width,canvas.height)

  // array to store detections for bottom text
  const detectedObjects = []

  predictions.forEach(pred=>{
    const [x,y,w,h]=pred.bbox

    // bounding boxes
    ctx.strokeStyle="#00FFFF"
    ctx.lineWidth=2
    ctx.strokeRect(x,y,w,h)

    // labels on video - always draw normally (not flipped)
    ctx.save()
    if(useFrontCamera) ctx.scale(-1,1) // flip canvas horizontally temporarily
    const labelX = useFrontCamera ? -x - w : x
    ctx.font="16px Arial"
    ctx.fillStyle="#00FFFF"
    ctx.fillText(`${pred.class} ${(pred.score*100).toFixed(1)}%`, labelX, y>10?y-5:10)
    ctx.restore()

    // push to detected objects list
    detectedObjects.push(`${pred.class} ${(pred.score*100).toFixed(1)}%`)
  })

  // show detected objects at the bottom
  resultDiv.innerText = detectedObjects.length>0 ? "Detected: " + detectedObjects.join(", ") : "No objects detected"

  requestAnimationFrame(detect)
}

toggleBtn.onclick=async()=>{
  useFrontCamera=!useFrontCamera
  await setupCamera()
}

(async()=>{
  await setupCamera()
  await loadModel()
  detect()
})()
</script>

</body>
</html>
