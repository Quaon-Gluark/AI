<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Object Detection</title>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

#videoContainer{
  position:relative;
  width:640px;
  height:480px;
  margin:auto;
}

video, canvas{
  position:absolute;
  top:0;
  left:0;
  width:640px;
  height:480px;
}

video{
  border:2px solid #333;
  border-radius:12px;
  background:black;
}

canvas{
  pointer-events:none;
}

video.mirrored, canvas.mirrored{
  transform:scaleX(-1);
}

#result{
  margin-top:20px;
  font-size:1.2em;
  font-weight:bold;
}

button{
  margin-top:15px;
  padding:10px 20px;
  font-size:1em;
  border-radius:8px;
  border:1px solid #333;
  background:white;
  cursor:pointer;
}

button:hover{
  background:#ddd;
}

/* DROPDOWN GRID */
#dropdownContent{
  display:none;
  margin-top:15px;
  background:white;
  padding:15px;
  border-radius:10px;
  border:1px solid #ccc;
  max-width:640px;
  margin-left:auto;
  margin-right:auto;
}

#objectGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:8px;
  margin-top:10px;
}

.object-item{
  padding:6px;
  border-radius:6px;
  background:#eee;
  font-size:0.85em;
  transition:0.2s;
}

/* highlight style */
.object-item.active{
  background:#00ffff;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Live Object Detection</h1>

<div id="videoContainer">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<br>

<button id="toggleCameraBtn">Toggle Camera</button>

<div>
  <button id="dropdownBtn">See what this model can detect ▼</button>

  <div id="dropdownContent">
    <strong>Detectable Objects (live highlight):</strong>
    <div id="objectGrid"></div>
  </div>
</div>

<div id="result">Loading model...</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
const COCO_CLASSES = [
"person","bicycle","car","motorcycle","airplane","bus","train","truck","boat","traffic light","fire hydrant","stop sign","parking meter","bench",
"bird","cat","dog","horse","sheep","cow","elephant","bear","zebra","giraffe",
"backpack","umbrella","handbag","tie","suitcase",
"frisbee","skis","snowboard","sports ball","kite","baseball bat","baseball glove","skateboard","surfboard","tennis racket",
"bottle","wine glass","cup","fork","knife","spoon","bowl",
"banana","apple","sandwich","orange","broccoli","carrot","hot dog","pizza","donut","cake",
"chair","couch","potted plant","bed","dining table","toilet",
"tv","laptop","mouse","remote","keyboard","cell phone",
"microwave","oven","toaster","sink","refrigerator",
"book","clock","vase","scissors","teddy bear","hair drier","toothbrush"
]

// create grid items
const objectGrid = document.getElementById("objectGrid")

COCO_CLASSES.forEach(obj=>{
  const div=document.createElement("div")
  div.className="object-item"
  div.innerText=obj
  div.id="obj-"+obj.replace(/\s/g,"-")
  objectGrid.appendChild(div)
})

const video = document.getElementById("webcam")
const canvas = document.getElementById("overlay")
const ctx = canvas.getContext("2d")
const resultDiv = document.getElementById("result")
const toggleBtn = document.getElementById("toggleCameraBtn")

const dropdownBtn = document.getElementById("dropdownBtn")
const dropdownContent = document.getElementById("dropdownContent")

let model
let currentStream=null
let useFrontCamera=false

// dropdown toggle
dropdownBtn.onclick = () => {
  const isVisible = dropdownContent.style.display === "block"
  dropdownContent.style.display = isVisible ? "none" : "block"
  dropdownBtn.innerText = isVisible
    ? "See what this model can detect ▼"
    : "See what this model can detect ▲"
}

async function setupCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t=>t.stop())
  }

  const constraints={
    audio:false,
    video:{facingMode:useFrontCamera?"user":{exact:"environment"}}
  }

  try{
    currentStream=await navigator.mediaDevices.getUserMedia(constraints)
  }catch{
    constraints.video.facingMode="user"
    currentStream=await navigator.mediaDevices.getUserMedia(constraints)
  }

  video.srcObject=currentStream
  video.classList.toggle("mirrored",useFrontCamera)
  canvas.classList.toggle("mirrored",useFrontCamera)

  return new Promise(resolve=>{
    video.onloadedmetadata=()=>resolve(video)
  })
}

async function loadModel(){
  model=await cocoSsd.load()
  resultDiv.innerText="Model loaded!"
}

async function detect(){
  if(!model || !video.videoWidth){
    requestAnimationFrame(detect)
    return
  }

  canvas.width=video.videoWidth
  canvas.height=video.videoHeight

  const predictions=await model.detect(video)
  ctx.clearRect(0,0,canvas.width,canvas.height)

  const detectedObjects = []
  const activeSet = new Set()

  predictions.forEach(pred=>{
    const [x,y,w,h]=pred.bbox

    ctx.strokeStyle="#00FFFF"
    ctx.lineWidth=2
    ctx.strokeRect(x,y,w,h)

    ctx.save()
    if(useFrontCamera) ctx.scale(-1,1)
    const labelX = useFrontCamera ? -x - w : x
    ctx.font="16px Arial"
    ctx.fillStyle="#00FFFF"
    ctx.fillText(`${pred.class} ${(pred.score*100).toFixed(1)}%`, labelX, y>10?y-5:10)
    ctx.restore()

    detectedObjects.push(`${pred.class} ${(pred.score*100).toFixed(1)}%`)
    activeSet.add(pred.class)
  })

  // update highlights
  COCO_CLASSES.forEach(obj=>{
    const el=document.getElementById("obj-"+obj.replace(/\s/g,"-"))
    if(activeSet.has(obj)){
      el.classList.add("active")
    }else{
      el.classList.remove("active")
    }
  })

  resultDiv.innerText = detectedObjects.length>0 
    ? "Detected: " + detectedObjects.join(", ") 
    : "No objects detected"

  requestAnimationFrame(detect)
}

toggleBtn.onclick=async()=>{
  useFrontCamera=!useFrontCamera
  await setupCamera()
}

(async()=>{
  await setupCamera()
  await loadModel()
  detect()
})()
</script>

</body>
</html>
